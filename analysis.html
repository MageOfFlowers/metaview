<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Analysis - Card Game Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 20px;">
        <a href="index.html" style="text-decoration: none; color: var(--primary);">← Trang chủ</a>
        <h1>📈 Phân tích Meta</h1>
    </header>

    <div class="card">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <div class="input-group">
                <label>Giải đấu</label>
                <select id="filterComp" style="width:100%; padding:8px;" onchange="triggerRender()"></select>
            </div>
            <div class="input-group">
                <label>Khu vực</label>
                <select id="filterRegion" style="width:100%; padding:8px;" onchange="triggerRender()">
                    <option value="all">Tất cả</option>
                    <option value="VN">Việt Nam</option>
                    <option value="INT">Quốc tế</option>
                </select>
            </div>
            <div class="input-group">
                <label>Từ ngày</label>
                <input type="date" id="filterStart" style="width:100%; padding:7px;" onchange="triggerRender()">
            </div>
            <div class="input-group">
                <label>Đến ngày</label>
                <input type="date" id="filterEnd" style="width:100%; padding:7px;" onchange="triggerRender()">
            </div>
            <div class="input-group">
                <label>Chế độ tính</label>
                <select id="calcMode" style="width:100%; padding:8px;" onchange="triggerRender()">
                    <option value="deck">Theo số bộ bài</option>
                    <option value="total">Theo số bản card</option>
                </select>
            </div>
        </div>
    </div>

    <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card">
            <h3>📊 Xếp hạng Bộ bài (Top Meta)</h3>
            <div style="height: 400px; position: relative;">
                <canvas id="deckRankingChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3>🏆 Xếp hạng Người chơi</h3>
                <select id="playerSortMode" onchange="window.triggerPlayerRender()" style="padding: 5px;">
                    <option value="winrate">Theo Winrate</option>
                    <option value="avgRank">Theo Hạng TB</option>
                </select>
            </div>
            <div style="height: 400px; position: relative;">
                <canvas id="playerRankingChart"></canvas>
            </div>
        </div>
    </div>

    <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🎨 Tỉ lệ sử dụng</h3>
                <select id="usageViewMode" onchange="triggerUsageRender()">
                    <option value="color">Theo Hệ</option>
                    <option value="rarity">Theo Độ hiếm</option>
                </select>
            </div>
            <div style="height: 300px; position: relative;"><canvas id="usageTypeChart"></canvas></div>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>🔝 Top 10 Thẻ bài</h3>
                <div style="display: flex; gap: 5px;">
                    <select id="filterWinrateColor" onchange="triggerWinrateOnlyRender()" style="width:80px">
                        <option value="all">Màu</option>
                        <option value="R">Đỏ</option><option value="P">Tím</option>
                        <option value="Y">Vàng</option><option value="G">Xanh</option>
                    </select>
                    <select id="topCardMode" onchange="triggerWinrateOnlyRender()">
                        <option value="useCount">Lượt dùng</option>
                        <option value="winrate">Winrate</option>
                    </select>
                </div>
            </div>
            <div style="height: 300px; position: relative;"><canvas id="winrateBarChart"></canvas></div>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>Danh sách Meta</h3>
            <input type="text" id="searchCard" placeholder="Tìm tên thẻ..." oninput="metaCurrentPage=1; renderTableOnly()" style="padding: 5px; width: 250px;">
        </div>
        <div class="table-responsive">
            <table>
                <thead><tr><th>Tên thẻ</th><th>Hệ</th><th>Hiếm</th><th>Sử dụng</th><th>Winrate</th></tr></thead>
                <tbody id="meta-body"></tbody>
            </table>
        </div>
        <div id="meta-pagination"></div>
    </div>
</div>

<script type="module" src="./js/analysis-main.js"></script>
</body>
</html>

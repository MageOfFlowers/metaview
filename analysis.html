<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Meta Analysis</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html">← Trang chủ</a>
            <h1>📈 Phân tích Meta</h1>
        </header>

        <div class="card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Lọc giải đấu</label>
                    <select id="filterComp"><option value="all">Tất cả giải</option></select>
                </div>
                <div class="input-group">
                    <label>Tìm thẻ bài</label>
                    <input type="text" id="searchCard" placeholder="Nhập tên...">
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card"><h3>Winrate Hệ Màu</h3><canvas id="colorChart"></canvas></div>
            <div class="card"><h3>Top sử dụng</h3><canvas id="usageChart"></canvas></div>
        </div>

        <div class="card">
            <table>
                <thead><tr><th>Tên thẻ</th><th>Hệ</th><th>Số Deck</th><th>Winrate</th></tr></thead>
                <tbody id="meta-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { request } from './js/api.js';
        import { MetaEngine } from './js/meta-engine.js';

        let rawData = {};
        let charts = {};

        async function init() {
            const [cards, uses, infos, comps] = await Promise.all([
                request('/cards'), request('/competition-use'), request('/deck-infos'), request('/competitions')
            ]);
            rawData = { cards, compUses: uses, deckInfos: infos };

            const select = document.getElementById('filterComp');
            comps.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
            
            select.addEventListener('change', render);
            document.getElementById('searchCard').addEventListener('input', render);
            render();
        }

        function render() {
            const compId = document.getElementById('filterComp').value;
            const search = document.getElementById('searchCard').value.toLowerCase();
            const stats = MetaEngine.calculateCardStats(rawData, compId);

            const filtered = stats.filter(s => s.name.toLowerCase().includes(search));

            document.getElementById('meta-body').innerHTML = filtered.map(s => `
                <tr>
                    <td><strong>${s.name}</strong></td>
                    <td><span class="badge" style="background:${MetaEngine.getColorCode(s.color)}">${s.color}</span></td>
                    <td>${s.count}</td>
                    <td>${s.winrate}%</td>
                </tr>
            `).join('');

            updateCharts(filtered);
        }

        function updateCharts(data) {
            const ctx1 = document.getElementById('usageChart').getContext('2d');
            if(charts.usage) charts.usage.destroy();
            charts.usage = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: data.slice(0, 5).map(s => s.name),
                    datasets: [{ data: data.slice(0, 5).map(s => s.count), backgroundColor: data.slice(0, 5).map(s => MetaEngine.getColorCode(s.color)) }]
                }
            });
        }

        init();
    </script>
</body>
</html>

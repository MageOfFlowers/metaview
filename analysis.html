<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Analysis - Card Game Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<div class="container">
    <header style="margin-bottom: 20px;">
        <a href="index.html" style="text-decoration: none; color: var(--primary);">← Trang chủ</a>
        <h1>📈 Phân tích Meta</h1>
    </header>

    <div class="card">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div class="input-group">
                <label style="font-size:0.8rem; color:var(--text-muted);">Giải đấu</label>
                <select id="filterComp" style="width:100%; padding:8px;" onchange="triggerRender()"></select>
            </div>
            <div class="input-group">
                <label style="font-size:0.8rem; color:var(--text-muted);">Khu vực</label>
                <select id="filterRegion" style="width:100%; padding:8px;" onchange="triggerRender()">
                    <option value="all">Cả nước</option>
                    <option value="S">Miền Nam</option>
                    <option value="N">Miền Bắc</option>
                </select>
            </div>
            <div class="input-group">
                <label style="font-size:0.8rem; color:var(--text-muted);">Từ ngày</label>
                <input type="date" id="filterStart" style="width:100%; padding:8px;" onchange="triggerRender()">
            </div>
            <div class="input-group">
                <label style="font-size:0.8rem; color:var(--text-muted);">Đến ngày</label>
                <input type="date" id="filterEnd" style="width:100%; padding:8px;" onchange="triggerRender()">
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                <h3>Tỷ lệ sử dụng</h3>
                <div style="display: flex; gap: 5px;">
                    <select id="calcMode" class="filter-sm" onchange="triggerRender()">
                        <option value="deck">Theo Deck</option>
                        <option value="total">Tổng bản copy</option>
                    </select>
                    <select id="usageViewMode" class="filter-sm" onchange="triggerUsageRender()">
                        <option value="color">Màu</option>
                        <option value="rarity">Độ hiếm</option>
                    </select>
                </div>
            </div>
            <div style="height: 300px;"><canvas id="usageTypeChart"></canvas></div>
        </div>
        
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                <h3>Top Card</h3>
                <div style="display: flex; gap: 5px;">
                    <select id="topCardMode" class="filter-sm" onchange="triggerWinrateOnlyRender()">
                        <option value="winrate">Winrate</option>
                        <option value="rank">Sử dụng</option>
                    </select>
                    <select id="filterWinrateColor" class="filter-sm" onchange="triggerWinrateOnlyRender()">
                        <option value="all">Tất cả màu</option>
                        <option value="R">Đỏ</option><option value="Y">Vàng</option><option value="G">Xanh</option><option value="P">Tím</option>
                    </select>
                </div>
            </div>
            <div style="height: 300px;"><canvas id="winrateBarChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>🏆 Xếp hạng Deck</h3>
            <input type="text" id="searchDeck" class="filter-sm" placeholder="Tìm deck..." oninput="triggerRender()">
        </div>
        <div style="height: 400px;"><canvas id="deckRankingChart"></canvas></div>
    </div>

    <div class="card">
    <div class="flex-header">
        <h3>Danh sách Meta Thẻ bài</h3>
        <input type="text" id="searchCard" class="filter-sm" placeholder="Tìm nhanh thẻ bài..." oninput="renderTableOnly()">
    </div>
    <div class="table-container"> <table>
            <thead>
                <tr>
                    <th>Tên thẻ bài</th>
                    <th>Hệ</th>
                    <th>Độ hiếm</th>
                    <th id="usage-column-header">Số lượt dùng</th>
                    <th>Winrate</th>
                </tr>
            </thead>
            <tbody id="meta-body"></tbody>
        </table>
    </div>
</div>

<div id="quantity-analysis" class="card hidden" style="margin-top: 20px; border: 2px solid var(--primary); background: #f8fafc;">
    <div class="flex-header">
        <h3 id="qty-title" style="color: var(--primary);">Phân tích chi tiết</h3>
    </div>
    
    <div class="dashboard-grid">
        <div class="card">
            <div style="height: 250px;"><canvas id="qtyWinrateChart"></canvas></div>
        </div>
        <div class="card">
            <div class="table-container"> <table>
                    <thead>
                        <tr>
                            <th>Số lượng</th>
                            <th>Số bộ bài</th>
                            <th>Winrate TB</th>
                        </tr>
                    </thead>
                    <tbody id="qty-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
</div>

<script type="module">
    import { initAnalysis } from './js/analysis-main.js';
    document.addEventListener('DOMContentLoaded', initAnalysis);
</script>
</body>
</html>

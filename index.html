<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Analyzer & Admin Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --success: #10b981; --bg: #f1f5f9; --text: #1e293b; 
            --red: #ef4444; --purple: #a855f7; --yellow: #eab308; --green: #22c55e;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; background: #e2e8f0; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary); }
        button.submit-btn { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .chart-box { min-height: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        .hidden { display: none; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Card Game Meta Portal</h1>

    <div class="tabs">
        <button id="btn-ana" class="tab-btn active" onclick="showTab('analysis')">📈 Phân tích Meta</button>
        <button id="btn-adm" class="tab-btn" onclick="showTab('admin')">⚙️ Quản lý (Admin)</button>
    </div>

    <div id="tab-analysis">
        <div class="card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Lọc theo giải đấu</label>
                    <select id="filterComp" onchange="applyFilters()"><option value="all">Tất cả giải</option></select>
                </div>
                <div class="input-group">
                    <label>Tìm kiếm thẻ bài</label>
                    <input type="text" id="searchCard" oninput="applyFilters()" placeholder="Nhập tên lá bài...">
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card chart-box">
                <h3>Winrate theo Hệ màu</h3>
                <canvas id="colorWinrateChart"></canvas>
            </div>
            <div class="card chart-box">
                <h3>Tỷ lệ sử dụng Thẻ bài (%)</h3>
                <canvas id="cardUsageChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Chi tiết Meta Thẻ bài</h3>
            <table>
                <thead>
                    <tr><th>Tên thẻ</th><th>Hệ</th><th>Số Deck sử dụng</th><th>Winrate TB</th></tr>
                </thead>
                <tbody id="meta-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-admin" class="hidden">
        <div class="dashboard-grid">
            <div class="card">
                <h3>👤 Thêm User</h3>
                <div class="input-group">
                    <label>Tên người chơi mới</label>
                    <input type="text" id="newUsername" placeholder="Ví dụ: MageOfFlowers">
                </div>
                <button class="submit-btn" onclick="addUser()">Lưu User</button>
            </div>

            <div class="card" style="grid-column: span 1;">
                <h3>🏆 Đăng ký kết quả Giải</h3>
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="input-group"><label>Giải đấu</label><select id="regComp"></select></div>
                    <div class="input-group"><label>Người chơi</label><select id="regUser"></select></div>
                    <div class="input-group"><label>Bộ bài sử dụng</label><select id="regDeck"></select></div>
                    <div class="input-group"><label>Tỷ lệ thắng thực tế (%)</label><input type="number" id="regWinrate" value="50"></div>
                </div>
                <button class="submit-btn" onclick="registerCompetition()">Xác nhận tham gia</button>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>🎴 Tạo bộ bài (Deck) mới</h3>
                <div class="input-group">
                    <label>Tên bộ bài</label>
                    <input type="text" id="newDeckName" style="margin-bottom: 10px;" placeholder="Ví dụ: Blue Control v2">
                </div>
                <div id="card-inputs-list"></div>
                <button onclick="addCardRow()" style="margin-top:10px; cursor:pointer;">+ Thêm lá bài</button>
                <button class="submit-btn" style="background:var(--primary)" onclick="addDeck()">Lưu bộ bài hệ thống</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://metaanalyse.onrender.com/api";
    let rawData = { cards: [], compUses: [], deckInfos: [], competitions: [], users: [], decks: [] };
    let charts = {};

    async function fetchData() {
        try {
            const [resCards, resUses, resInfos, resComps, resUsers, resDecks] = await Promise.all([
                fetch(`${API_BASE}/cards`).then(r => r.json()),
                fetch(`${API_BASE}/competition-use`).then(r => r.json()),
                fetch(`${API_BASE}/deck-infos`).then(r => r.json()),
                fetch(`${API_BASE}/competitions`).then(r => r.json()),
                fetch(`${API_BASE}/users`).then(r => r.json()),
                fetch(`${API_BASE}/decks`).then(r => r.json())
            ]);

            rawData = { cards: resCards, compUses: resUses, deckInfos: resInfos, competitions: resComps, users: resUsers, decks: resDecks };

            populateDropdowns();
            applyFilters();
        } catch (err) { 
            console.error("Lỗi tải dữ liệu. Hãy chắc chắn Backend đã chạy!"); 
        }
    }

    function populateDropdowns() {
        const fill = (id, data, textKey) => {
            const el = document.getElementById(id);
            if(!el) return;
            el.innerHTML = (id === 'filterComp' ? '<option value="all">Tất cả giải</option>' : '');
            data.forEach(item => {
                el.innerHTML += `<option value="${item.id}">${item[textKey] || item.name}</option>`;
            });
        };
        fill('filterComp', rawData.competitions, 'name');
        fill('regComp', rawData.competitions, 'name');
        fill('regUser', rawData.users, 'username');
        fill('regDeck', rawData.decks, 'name');
    }

    function showTab(tab) {
        document.getElementById('tab-analysis').classList.toggle('hidden', tab !== 'analysis');
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('btn-ana').classList.toggle('active', tab === 'analysis');
        document.getElementById('btn-adm').classList.toggle('active', tab === 'admin');
        if(tab === 'admin' && document.getElementById('card-inputs-list').innerHTML === "") addCardRow();
    }

    // --- XỬ LÝ ADMIN ---
    async function addUser() {
        const username = document.getElementById('newUsername').value;
        if(!username) return alert("Vui lòng nhập tên!");
        await fetch(`${API_BASE}/users?username=${encodeURIComponent(username)}`, { method: 'POST' });
        alert("Đã thêm User!");
        fetchData();
    }

    function addCardRow() {
        const container = document.getElementById('card-inputs-list');
        const div = document.createElement('div');
        div.className = 'form-grid';
        div.style.marginBottom = '8px';
        div.innerHTML = `
            <select class="deck-card-id">${rawData.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select>
            <input type="number" class="deck-card-qty" value="1" min="1" max="4">
        `;
        container.appendChild(div);
    }

    async function addDeck() {
        const name = document.getElementById('newDeckName').value;
        const ids = document.querySelectorAll('.deck-card-id');
        const qtys = document.querySelectorAll('.deck-card-qty');
        const cards = [];
        ids.forEach((el, i) => cards.push({ cardid: parseInt(el.value), quantity: parseInt(qtys[i].value) }));
        
        await fetch(`${API_BASE}/decks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, cards })
        });
        alert("Đã tạo Deck thành công!");
        fetchData();
    }

    async function registerCompetition() {
        const dto = {
            competitionid: parseInt(document.getElementById('regComp').value),
            userid: parseInt(document.getElementById('regUser').value),
            deckid: parseInt(document.getElementById('regDeck').value),
            winrate: parseFloat(document.getElementById('regWinrate').value)
        };
        await fetch(`${API_BASE}/competition-use`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dto)
        });
        alert("Đăng ký giải đấu thành công!");
        fetchData();
    }

    // --- PHÂN TÍCH & BIỂU ĐỒ ---
    function applyFilters() {
        const compId = document.getElementById('filterComp').value;
        const search = document.getElementById('searchCard').value.toLowerCase();
        
        // Lọc CompUses
        const filteredUses = compId === 'all' ? rawData.compUses : rawData.compUses.filter(u => u.competitionid == compId);
        
        // Tính toán Meta cho từng lá bài
        const stats = {};
        rawData.cards.forEach(c => stats[c.id] = { name: c.name, color: c.color, count: 0, totalWinrate: 0 });

        filteredUses.forEach(use => {
            const deckContent = rawData.deckInfos.filter(di => di.deckid === use.deckid);
            deckContent.forEach(item => {
                if(stats[item.cardid]) {
                    stats[item.cardid].count++;
                    stats[item.cardid].totalWinrate += use.winrate;
                }
            });
        });

        const tableData = Object.values(stats)
            .filter(s => s.name.toLowerCase().includes(search))
            .sort((a, b) => b.count - a.count);

        updateUI(tableData);
    }

    function updateUI(data) {
        const tbody = document.getElementById('meta-body');
        tbody.innerHTML = data.map(s => `
            <tr>
                <td><strong>${s.name}</strong></td>
                <td><span class="badge" style="background:${getColorCode(s.color)}">${s.color}</span></td>
                <td>${s.count}</td>
                <td>${s.count > 0 ? (s.totalWinrate / s.count).toFixed(1) : 0}%</td>
            </tr>
        `).join('');

        updateCharts(data);
    }

    function getColorCode(c) {
        const map = { 'R': '#ef4444', 'P': '#a855f7', 'Y': '#eab308', 'G': '#22c55e' };
        return map[c] || '#64748b';
    }

    function updateCharts(data) {
        const top5 = data.slice(0, 5);
        
        // Chart 1: Usage
        if(charts.usage) charts.usage.destroy();
        charts.usage = new Chart(document.getElementById('cardUsageChart'), {
            type: 'doughnut',
            data: {
                labels: top5.map(s => s.name),
                datasets: [{ data: top5.map(s => s.count), backgroundColor: top5.map(s => getColorCode(s.color)) }]
            },
            options: { maintainAspectRatio: false }
        });

        // Chart 2: Color Winrate (Giả lập theo data hiện tại)
        const colors = ['R', 'P', 'Y', 'G'];
        const colorWinrates = colors.map(c => {
            const items = data.filter(s => s.color === c && s.count > 0);
            return items.length ? items.reduce((a,b) => a + (b.totalWinrate/b.count), 0) / items.length : 0;
        });

        if(charts.winrate) charts.winrate.destroy();
        charts.winrate = new Chart(document.getElementById('colorWinrateChart'), {
            type: 'bar',
            data: {
                labels: ['Đỏ', 'Tím', 'Vàng', 'Xanh'],
                datasets: [{ label: 'Winrate TB (%)', data: colorWinrates, backgroundColor: colors.map(c => getColorCode(c)) }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } }, maintainAspectRatio: false }
        });
    }

    fetchData();
</script>
</body>
</html>

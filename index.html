<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Analyzer & Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #2563eb; --success: #10b981; --bg: #f1f5f9; --text: #1e293b; 
            --red: #ef4444; --purple: #a855f7; --yellow: #eab308; --green: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1250px; margin: auto; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #e2e8f0; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Form Styling */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        button.submit-btn { background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        
        /* Analysis UI - Giữ nguyên từ bản trước */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .chart-container { height: 300px; position: relative; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .bg-R { background-color: var(--red); } .bg-P { background-color: var(--purple); }
        .bg-Y { background-color: var(--yellow); } .bg-G { background-color: var(--green); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Card Game Portal</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('analysis')">📈 Phân tích Meta</button>
        <button class="tab-btn" onclick="showTab('admin')">⚙️ Quản lý (Admin)</button>
    </div>

    <div id="tab-analysis">
        <div class="card">
            <div class="form-grid">
                <div class="input-group">
                    <label>Lọc theo giải</label>
                    <select id="filterComp" onchange="applyFilters()"><option value="all">Tất cả</option></select>
                </div>
                <div class="input-group">
                    <label>Tìm thẻ</label>
                    <input type="text" id="searchCard" oninput="applyFilters()" placeholder="Tên thẻ...">
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card"><h3>Winrate Hệ Màu</h3><div class="chart-container"><canvas id="colorWinrateChart"></canvas></div></div>
            <div class="card"><h3>Top Thẻ Bài</h3><div class="chart-container"><canvas id="cardUsageChart"></canvas></div></div>
        </div>

        <div class="card">
            <h3>Chi tiết Thẻ bài</h3>
            <table>
                <thead><tr><th>Tên thẻ</th><th>Số Deck</th><th>Winrate TB</th></tr></thead>
                <tbody id="meta-body"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-admin" class="hidden">
        <div class="dashboard-grid">
            <div class="card">
                <h3>👤 Thêm User mới</h3>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="newUsername" placeholder="Ví dụ: MageOfFlowers">
                </div>
                <button class="submit-btn" onclick="addUser()">Lưu User</button>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>🎴 Tạo bộ bài (Deck)</h3>
                <div class="input-group">
                    <label>Tên bộ bài</label>
                    <input type="text" id="newDeckName" placeholder="Ví dụ: Red Aggro v1">
                </div>
                <div id="deck-builder" style="margin-top:15px;">
                    <label>Thành phần lá bài:</label>
                    <div id="card-inputs-list">
                        </div>
                    <button onclick="addCardRow()" style="margin-top:10px; font-size: 0.8rem;">+ Thêm lá bài</button>
                </div>
                <button class="submit-btn" style="background:var(--primary)" onclick="addDeck()">Tạo bộ bài & DeckInfo</button>
            </div>

            <div class="card">
                <h3>🏆 Đăng ký Giải đấu</h3>
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="input-group"><label>Giải đấu</label><select id="regComp"></select></div>
                    <div class="input-group"><label>Người chơi</label><select id="regUser"></select></div>
                    <div class="input-group"><label>Bộ bài</label><select id="regDeck"></select></div>
                    <div class="input-group"><label>Tỷ lệ thắng (%)</label><input type="number" id="regWinrate" value="50"></div>
                </div>
                <button class="submit-btn" onclick="registerCompetition()">Xác nhận tham gia</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://metaanalyse.onrender.com/api";
    let rawData = { cards: [], compUses: [], deckInfos: [], competitions: [], users: [], decks: [] };
    let charts = {};

    // --- KHỞI TẠO & TẢI DỮ LIỆU ---
    async function fetchData() {
        try {
            const [resCards, resUses, resInfos, resComps, resUsers, resDecks] = await Promise.all([
                fetch(`${API_BASE}/cards`),
                fetch(`${API_BASE}/competition-use`),
                fetch(`${API_BASE}/deck-infos`),
                fetch(`${API_BASE}/competitions`),
                fetch(`${API_BASE}/users`), // Bạn cần thêm @GetMapping("/users") ở Backend
                fetch(`${API_BASE}/decksget`)   // Bạn cần thêm @GetMapping("/decks") ở Backend
            ]);

            rawData = {
                cards: await resCards.json(),
                compUses: await resUses.json(),
                deckInfos: await resInfos.json(),
                competitions: await resComps.json(),
                users: await resUsers.json(),
                decks: await resDecks.json()
            };

            populateDropdowns();
            applyFilters();
        } catch (err) { console.error("Lỗi fetch:", err); }
    }

    function populateDropdowns() {
        const fill = (id, data, textKey) => {
            const el = document.getElementById(id);
            el.innerHTML = (id === 'filterComp' ? '<option value="all">Tất cả giải</option>' : '');
            data.forEach(item => {
                el.innerHTML += `<option value="${item.id}">${item[textKey] || item.name || 'ID '+item.id}</option>`;
            });
        };
        fill('filterComp', rawData.competitions, 'name');
        fill('regComp', rawData.competitions, 'name');
        fill('regUser', rawData.users, 'username');
        fill('regDeck', rawData.decks, 'name');
    }

    // --- QUẢN LÝ TABS ---
    function showTab(tab) {
        document.getElementById('tab-analysis').classList.toggle('hidden', tab !== 'analysis');
        document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        if(tab === 'admin') addCardRow(); // Mồi 1 dòng card khi vào admin
    }

    // --- LOGIC GỌI API (POST) ---

    // 1. Thêm User
    async function addUser() {
        const username = document.getElementById('newUsername').value;
        if(!username) return alert("Nhập username!");
        
        await fetch(`${API_BASE}/users?username=${username}`, { method: 'POST' });
        alert("Thành công!");
        fetchData();
    }

    // 2. Thêm Deck (Phức tạp hơn vì gửi kèm JSON Body)
    function addCardRow() {
        const container = document.getElementById('card-inputs-list');
        const row = document.createElement('div');
        row.className = 'form-grid';
        row.style.marginBottom = '5px';
        row.innerHTML = `
            <select class="deck-card-id">${rawData.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select>
            <input type="number" class="deck-card-qty" value="1" min="1" max="4">
        `;
        container.appendChild(row);
    }

    async function addDeck() {
        const name = document.getElementById('newDeckName').value;
        const cardIds = document.querySelectorAll('.deck-card-id');
        const cardQtys = document.querySelectorAll('.deck-card-qty');
        
        const cards = [];
        cardIds.forEach((el, i) => {
            cards.push({ cardid: parseInt(el.value), quantity: parseInt(cardQtys[i].value) });
        });

        const dto = { name: name, cards: cards };

        await fetch(`${API_BASE}/decks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dto)
        });
        alert("Đã tạo Deck!");
        fetchData();
    }

    // 3. Đăng ký Giải đấu (CompetitionUse)
    async function registerCompetition() {
        const dto = {
            competitionid: parseInt(document.getElementById('regComp').value),
            userid: parseInt(document.getElementById('regUser').value),
            deckid: parseInt(document.getElementById('regDeck').value),
            winrate: parseFloat(document.getElementById('regWinrate').value),
            rank: 1 // Mặc định rank 1 hoặc thêm input nếu cần
        };

        await fetch(`${API_BASE}/competition-use`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dto)
        });
        alert("Đã đăng ký!");
        fetchData();
    }

    // --- LOGIC PHÂN TÍCH (Giữ nguyên từ bản trước) ---
    function applyFilters() {
        // ... (Code lọc dữ liệu và vẽ chart như bản full trước đó) ...
        // Lưu ý: Đoạn này bạn copy lại logic hàm applyFilters và updateCharts ở file cũ vào đây.
        // Để tiết kiệm không gian tôi không lặp lại toàn bộ logic vẽ chart, 
        // nhưng bạn hãy giữ nguyên phần updateCharts() đã có.
    }

    fetchData();
</script>
</body>
</html>

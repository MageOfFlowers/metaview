<div class="accordion-item">
    <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">👤 Quản lý Người dùng <span>+</span></div>
    <div class="accordion-content">
        <div class="input-group">
            <label>Tên người dùng</label>
            <input type="text" id="userName" placeholder="Nhập tên mới...">
        </div>
        <button class="btn-submit" id="save-user-btn">Lưu người dùng</button>
    </div>
</div>

<script type="module">
    import { request } from '../js/api.js';
    document.getElementById('save-user-btn').onclick = async () => {
        const name = document.getElementById('userName').value.trim();
        if(!name) return alert("Nhập tên!");
        await request(`/usersadd?username=${encodeURIComponent(name)}`, 'POST');
        alert("Thành công!");
        window.refreshAllData();
    };
</script>

<div class="accordion-item active">
    <div class="accordion-header">🎴 Tạo bộ bài & Deck Builder <span>−</span></div>
    <div class="accordion-content">
        <div class="input-group">
            <label>Tên bộ bài</label>
            <input type="text" id="deckName" placeholder="Tên Deck..." style="width:100%; margin-bottom:15px;">
        </div>
        <div class="filter-bar">
            <input type="text" id="searchCard" placeholder="Tìm tên lá bài..." style="flex:1">
            <button class="color-btn active" data-color="all">Tất cả</button>
            <button class="color-btn" data-color="R">Đỏ (R)</button>
            <button class="color-btn" data-color="G">Xanh (G)</button>
            <button class="color-btn" data-color="Y">Vàng (Y)</button>
            <button class="color-btn" data-color="P">Tím (P)</button>
        </div>
        <div class="dashboard-grid">
            <div>
                <label>Thư viện (Click để chọn)</label>
                <div class="card-library" id="card-library-view"></div>
            </div>
            <div>
                <label>Lá bài đã chọn</label>
                <div id="deck-list-container" style="min-height: 200px; border: 1px dashed #ccc; padding:10px;"></div>
                <button class="btn-submit" id="save-deck-btn" style="margin-top:20px;">Lưu vào cơ sở dữ liệu</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { request } from '../js/api.js';

    let selectedColor = 'all';

    function renderLibrary() {
        const container = document.getElementById('card-library-view');
        const term = document.getElementById('searchCard').value.toLowerCase();
        const filtered = window.cacheData.allCards.filter(c => {
            return (selectedColor === 'all' || c.color === selectedColor) && c.name.toLowerCase().includes(term);
        });
        container.innerHTML = filtered.map(c => `
            <div class="card-item" onclick="window.addCardToDeck(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
                <img src="${c.url}" title="${c.name}">
                <div class="card-name-mini">${c.name}</div>
            </div>
        `).join('');
    }

    window.addCardToDeck = (id, name) => {
        const container = document.getElementById('deck-list-container');
        const existing = container.querySelector(`.selected-row[data-id="${id}"]`);
        if(existing) {
            const qty = existing.querySelector('.d-qty');
            qty.value = Math.min(4, parseInt(qty.value) + 1);
            return;
        }
        const div = document.createElement('div');
        div.className = 'selected-row'; div.dataset.id = id;
        div.style.marginBottom = '8px'; div.style.display = 'flex'; div.style.justifyContent = 'space-between';
        div.innerHTML = `<span style="font-size:0.8rem">${name}</span>
            <div><input type="number" class="d-qty" value="1" min="1" max="4" style="width:50px">
            <button onclick="this.parentElement.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer">✖</button></div>`;
        container.appendChild(div);
    };

    document.getElementById('searchCard').oninput = renderLibrary;
    document.querySelectorAll('#deck-admin-slot .color-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('#deck-admin-slot .color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedColor = btn.dataset.color;
            renderLibrary();
        };
    });

    document.getElementById('save-deck-btn').onclick = async () => {
        const name = document.getElementById('deckName').value;
        const cards = Array.from(document.querySelectorAll('.selected-row')).map(r => ({
            cardid: parseInt(r.dataset.id),
            quantity: parseInt(r.querySelector('.d-qty').value)
        }));
        if(!name || cards.length === 0) return alert("Thiếu thông tin!");
        const res = await request('/decks', 'POST', { name, cards });
        if(res) { alert("Thành công!"); location.reload(); }
    };

    document.querySelector('#deck-admin-slot .accordion-header').onclick = function() {
        this.parentElement.classList.toggle('active');
        this.querySelector('span').innerText = this.parentElement.classList.contains('active') ? '−' : '+';
    };

    window.addEventListener('data-loaded', renderLibrary);
</script>

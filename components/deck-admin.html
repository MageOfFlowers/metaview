<div class="accordion-item active">
    <div class="accordion-header">🎴 Deck Builder (Sửa & Xóa) <span>−</span></div>
    <div class="accordion-content">
        <input type="hidden" id="currentDeckId" value="0">
        <input type="text" id="deckName" placeholder="Tên bộ bài..." style="width:100%; margin-bottom:10px;">
        <div class="dashboard-grid">
            <div id="lib-view" class="card-library"></div>
            <div id="selected-cards" style="border:1px dashed #ccc; padding:10px; min-height:100px;"></div>
        </div>
        <button class="btn-submit" id="btn-save-deck">Lưu (Thêm/Sửa)</button>
        <button class="btn-submit" style="background:#888" onclick="clearDeck()">Tạo mới</button>
        <hr>
        <h4>Danh sách Deck hiện có</h4>
        <div id="deck-list-admin" class="dashboard-grid"></div>
    </div>
</div>

<script type="module">
    import { request } from '../js/api.js';

    function render() {
        // Render thư viện
        document.getElementById('lib-view').innerHTML = window.adminState.cards.map(c => `
            <div class="card-item" onclick="window.addCard(${c.id}, '${c.name}')">
                <img src="${c.url}"><div class="card-name-mini">${c.name}</div>
            </div>
        `).join('');

        // Render danh sách Deck để Sửa/Xóa
        document.getElementById('deck-list-admin').innerHTML = window.adminState.decks.map(d => `
            <div class="card-item edit-row" onclick="loadDeck(${d.id})">
                <strong>${d.name}</strong>
                <button class="delete-btn" onclick="event.stopPropagation(); delD(${d.id})">Xóa</button>
            </div>
        `).join('');
    }

    window.addCard = (id, name, qty = 1) => {
        const cont = document.getElementById('selected-cards');
        if(cont.querySelector(`[data-id="${id}"]`)) return;
        const div = document.createElement('div');
        div.className = 'selected-row';
        div.dataset.id = id;
        div.innerHTML = `${name} <input type="number" class="d-qty" value="${qty}" style="width:40px"> <span onclick="this.parentElement.remove()">✖</span>`;
        cont.appendChild(div);
    };

    window.loadDeck = async (id) => {
        const d = await request(`/decks/${id}`);
        document.getElementById('currentDeckId').value = d.id;
        document.getElementById('deckName').value = d.name;
        document.getElementById('selected-cards').innerHTML = '';
        d.deckInfos?.forEach(i => window.addCard(i.cardid, i.cardName, i.quantity));
    };

    window.delD = async (id) => {
        if(confirm("Xóa Deck này?")) {
            await request('/deck-delete', 'POST', id);
            window.refreshData();
        }
    };

    window.clearDeck = () => {
        document.getElementById('currentDeckId').value = "0";
        document.getElementById('deckName').value = "";
        document.getElementById('selected-cards').innerHTML = "";
    };

    document.getElementById('btn-save-deck').onclick = async () => {
        const body = {
            id: parseInt(document.getElementById('currentDeckId').value),
            name: document.getElementById('deckName').value,
            cards: Array.from(document.querySelectorAll('.selected-row')).map(r => ({
                cardid: parseInt(r.dataset.id),
                quantity: parseInt(r.querySelector('.d-qty').value)
            }))
        };
        await request('/decks', 'POST', body);
        alert("Đã lưu!");
        window.refreshData();
        window.clearDeck();
    };

    window.addEventListener('state-updated', render);
</script>

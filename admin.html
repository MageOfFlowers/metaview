<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .select-dropdown { display: none; height: 100px; margin-top:5px; }
        .select-dropdown.show { display: block; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="index.html">← Trang chủ</a>
        <h1>⚙️ Quản lý hệ thống</h1>
    </header>

    <div id="user-admin-slot"></div>
    <div id="competition-admin-slot"></div>
    <div id="deck-admin-slot"></div>
</div>

<script type="module">
    import { request } from './js/api.js';
    
    // Khai báo cacheData toàn cục để các component dùng chung
    window.cacheData = { users: [], decks: [], comps: [], allCards: [] };

    async function loadComponent(id, file) {
        const res = await fetch(file);
        const container = document.getElementById(id);
        container.innerHTML = await res.text();
        const scripts = container.querySelectorAll("script");
        for (const oldScript of scripts) {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
        }
    }

    // Helper filter dùng chung cho các select search
    window.filterSelect = (selectId, searchTerm) => {
        const el = document.getElementById(selectId);
        const term = searchTerm.trim().toLowerCase();
        if (term === "") { el.classList.remove('show'); return; }

        let data = [];
        let key = 'name';
        if (selectId === 'regUser') { data = window.cacheData.users; key = 'username'; }
        else if (selectId === 'regDeck') { data = window.cacheData.decks; }
        else if (selectId === 'regComp') { data = window.cacheData.comps; }

        const filtered = data.filter(item => (item[key] || "").toLowerCase().includes(term));
        el.innerHTML = filtered.map(i => `<option value="${i.id}">${i[key] || i.name}</option>`).join('');
        filtered.length > 0 ? el.classList.add('show') : el.classList.remove('show');
    };

    window.refreshAllData = async () => {
        const [users, decks, comps, cards] = await Promise.all([
            request('/users'), request('/decksget'), request('/competitions'), request('/cards')
        ]);
        window.cacheData = { 
            users: users || [], 
            decks: decks || [], 
            comps: comps || [], 
            allCards: cards || [] 
        };
        // Thông báo cho các component rằng dữ liệu đã sẵn sàng
        window.dispatchEvent(new CustomEvent('data-loaded'));
    };

    async function init() {
        await Promise.all([
            loadComponent('user-admin-slot', 'components/user-admin.html'),
            loadComponent('competition-admin-slot', 'components/competition-admin.html'),
            loadComponent('deck-admin-slot', 'components/deck-admin.html')
        ]);
        await window.refreshAllData();
    }
    init();
</script>
</body>
</html>

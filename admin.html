<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý Hệ thống</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Style bổ sung để hỗ trợ việc hiển thị các component động */
        .section-loading { padding: 20px; text-align: center; color: #666; }
        .select-dropdown.show { display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html">← Trang chủ</a>
            <h1>⚙️ Quản lý hệ thống</h1>
        </header>

        <div id="user-section"></div>
        <div id="competition-section"></div>
        <div id="deck-section"></div>
    </div>

    <script type="module">
        import { request } from './js/api.js';

        // Hàm nạp component và thực thi script bên trong nó
        async function loadComponent(id, file) {
            try {
                const container = document.getElementById(id);
                container.innerHTML = '<div class="section-loading">Đang tải thành phần...</div>';
                
                const res = await fetch(file);
                const html = await res.text();
                container.innerHTML = html;

                // Kích hoạt lại các thẻ script để logic add/update/delete hoạt động
                const scripts = container.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (error) {
                console.error(`Lỗi khi nạp ${file}:`, error);
            }
        }

        // Khởi tạo các accordion và nạp dữ liệu
        async function initAdmin() {
            // Nạp đồng thời cả 3 tab từ folder components
            await Promise.all([
                loadComponent('user-section', 'components/user-admin.html'),
                loadComponent('competition-section', 'components/competition-admin.html'),
                loadComponent('deck-section', 'components/deck-admin.html')
            ]);

            // Cấu hình sự kiện đóng mở cho các Accordion vừa nạp
            document.querySelectorAll('.accordion-header').forEach(header => {
                header.onclick = () => {
                    const item = header.parentElement;
                    const isActive = item.classList.contains('active');
                    
                    // Đóng các cái khác (tùy chọn)
                    // document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));
                    
                    item.classList.toggle('active');
                    header.querySelector('span').innerText = item.classList.contains('active') ? '−' : '+';
                };
            });

            console.log("Hệ thống Admin đã sẵn sàng.");
        }

        // Chạy khởi tạo
        initAdmin();

        // Lắng nghe sự kiện khi dữ liệu thay đổi để cập nhật các dropdown khác
        window.addEventListener('data-updated', async (e) => {
            console.log(`Dữ liệu ${e.detail} đã thay đổi, cập nhật UI...`);
            // Bạn có thể gọi lại hàm fill dữ liệu ở đây nếu cần
        });
    </script>
</body>
</html>

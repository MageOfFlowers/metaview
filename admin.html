<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý Hệ thống</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS bổ trợ giao diện */
        .select-dropdown { display: none; height: 120px; border: 1px solid #ccc; overflow-y: auto; background: #fff; width: 100%; position: absolute; z-index: 100; }
        .select-dropdown.show { display: block; }
        .selected-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; align-items: center; }
        .history-info { background: #f0f7ff; padding: 8px; border-radius: 4px; border-left: 4px solid #2196F3; margin-top: 5px; font-size: 0.85rem; color: #555; }
        
        /* Bảng danh sách bộ bài gọn nhẹ */
        .deck-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .deck-table th, .deck-table td { padding: 10px; border: 1px solid #eee; text-align: left; }
        .deck-table th { background: #f4f4f4; font-size: 0.85rem; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-sm { padding: 4px 10px; border: none; border-radius: 3px; cursor: pointer; color: white; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="index.html">← Trang chủ</a>
        <h1>⚙️ Quản lý hệ thống</h1>
    </header>

    <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAcc(this)">👤 Quản lý Người dùng <span>+</span></div>
        <div class="accordion-content">
            <div class="input-group">
                <label>Tên người dùng mới</label>
                <input type="text" id="userName" placeholder="Nhập tên...">
            </div>
            <button class="btn-submit" id="save-user-btn">Lưu người dùng</button>
        </div>
    </div>

    <div class="accordion-item">
        <div class="accordion-header" onclick="toggleAcc(this)">🏆 Đăng ký Giải & Xem Lịch sử <span>+</span></div>
        <div class="accordion-content">
            <div class="dashboard-grid">
                <div class="input-group">
                    <label>Người chơi</label>
                    <input type="text" id="searchRegUser" placeholder="Tìm người chơi..." oninput="window.filterSelect('regUser', this.value)">
                    <select id="regUser" size="4" class="select-dropdown"></select>
                    <div id="user-history-view" class="history-info" style="display:none;"></div>
                </div>
                <div class="input-group">
                    <label>Bộ bài</label>
                    <input type="text" id="searchRegDeck" placeholder="Tìm bộ bài..." oninput="window.filterSelect('regDeck', this.value)">
                    <select id="regDeck" size="4" class="select-dropdown"></select>
                </div>
                <div class="input-group">
                    <label>Giải đấu</label>
                    <input type="text" id="searchRegComp" placeholder="Tìm giải..." oninput="window.filterSelect('regComp', this.value)">
                    <select id="regComp" size="4" class="select-dropdown"></select>
                </div>
            </div>
            <button class="btn-submit" id="btn-reg">Xác nhận đăng ký kết quả</button>
        </div>
    </div>

<div class="accordion-item active">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">🎴 Deck Builder (Soạn bộ bài) <span>−</span></div>
        <div class="accordion-content">
            <input type="hidden" id="currentDeckId" value="0">
            <div class="input-group">
                <label>Tên bộ bài</label>
                <input type="text" id="deckName" placeholder="Tên bộ bài..." style="width:100%; margin-bottom:10px;">
            </div>
            
            <div class="dashboard-grid">
                <div>
                    <label>Thư viện bài</label>
                    <div class="card-library" id="card-lib-view"></div>
                </div>
                <div>
                    <label>Bộ bài đang soạn</label>
                    <div id="deck-build-container" style="min-height: 150px; border: 1px dashed #ccc; padding:10px;"></div>
                    <button class="btn-submit" id="save-deck-btn" style="margin-top:15px;">Lưu bộ bài</button>
                    <button class="btn-submit" style="background:#888; margin-top:5px;" onclick="window.resetDeckForm()">Làm mới Form</button>
                </div>
            </div>
        </div>
    </div>

    <div class="accordion-item active">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">📋 Danh sách bộ bài đã tạo <span>−</span></div>
        <div class="accordion-content">
            <input type="text" id="deckListSearch" class="search-input" placeholder="🔍 Tìm kiếm tên bộ bài hoặc lá bài..." oninput="window.renderDeckList()">
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="deck-table">
                    <thead>
                        <tr>
                            <th>Thông tin bộ bài</th>
                            <th style="width:120px; text-align:center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="deck-list-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { request } from './js/api.js';

    window.cacheData = { users: [], decks: [], comps: [], cards: [] };

    // 🔄 TẢI DỮ LIỆU BAN ĐẦU
async function reloadData() {
    const [u, d, c, cards, infos] = await Promise.all([
        request('/users'), 
        request('/decksget'), 
        request('/competitions'), 
        request('/cards'),
        request('/deck-infos') // Nạp thêm thông tin chi tiết thẻ
    ]);
    
    // Gắn thông tin cards vào từng deck dựa trên deck-infos
    const decksWithCards = d.map(deck => {
        const matchingInfos = infos.filter(info => info.deckid === deck.id);
        return {
            ...deck,
            cards: matchingInfos.map(info => ({
                id: info.cardid,
                name: info.cardName || cards.find(c => c.id === info.cardid)?.name || "Unknown",
                quantity: info.quantity
            }))
        };
    });

    window.cacheData = { 
        users: u || [], 
        decks: decksWithCards, 
        cards: cards || [] 
    };
    
    window.renderDeckList();
    renderLibrary();
}
    // 🔍 LOGIC GỢI Ý (SUGGESTION)
    window.filterSelect = (selectId, term) => {
        const el = document.getElementById(selectId);
        const val = term.trim().toLowerCase();
        if (!val) { el.classList.remove('show'); return; }

        let data = [];
        let key = 'name';
        if (selectId === 'regUser') { data = window.cacheData.users; key = 'username'; }
        else if (selectId === 'regDeck') { data = window.cacheData.decks; }
        else if (selectId === 'regComp') { data = window.cacheData.comps; }

        const filtered = data.filter(i => (i[key] || "").toLowerCase().includes(val));
        el.innerHTML = filtered.map(i => `<option value="${i.id}">${i[key]}</option>`).join('');
        filtered.length > 0 ? el.classList.add('show') : el.classList.remove('show');
    };

    document.getElementById('regUser').onchange = async (e) => {
        const userId = e.target.value;
        document.getElementById('searchRegUser').value = e.target.options[e.target.selectedIndex].text;
        e.target.classList.remove('show');

        // Xem lịch sử người chơi
        const history = await request(`/users/${userId}/history`);
        const hint = document.getElementById('user-history-view');
        hint.style.display = 'block';
        hint.innerHTML = history?.length 
            ? `<b>Lịch sử:</b> Đã dùng bài ${history.map(h => h.deckName).join(', ')}` 
            : 'Người chơi mới, chưa có dữ liệu.';
    };

    ['regDeck', 'regComp'].forEach(id => {
        document.getElementById(id).onchange = (e) => {
            const inputId = 'search' + id.charAt(0).toUpperCase() + id.slice(1);
            document.getElementById(inputId).value = e.target.options[e.target.selectedIndex].text;
            e.target.classList.remove('show');
        };
    });

    // 🎴 LOGIC DECK BUILDER

window.addToDeck = (id, name, qty = 1) => {
        const container = document.getElementById('deck-build-container');
        if(container.querySelector(`[data-id="${id}"]`)) return;
        const div = document.createElement('div');
        div.className = 'selected-row'; div.dataset.id = id;
        div.innerHTML = `<span>${name}</span>
            <div><input type="number" class="q" value="${qty}" min="1" max="4" style="width:40px">
            <button onclick="this.parentElement.parentElement.remove()" style="color:red; background:none; border:none; cursor:pointer; margin-left:10px;">✖</button></div>`;
        container.appendChild(div);
    };

    // 📋 DANH SÁCH RÚT GỌN
// admin.html - Cập nhật renderDeckList
window.renderDeckList = () => {
    const term = document.getElementById('deckListSearch').value.toLowerCase();
    const tbody = document.getElementById('deck-list-tbody');
    
    const filtered = window.cacheData.decks.filter(d => {
        const deckNameMatch = d.name.toLowerCase().includes(term);
        const cardsMatch = d.cards?.some(c => c.name.toLowerCase().includes(term));
        return deckNameMatch || cardsMatch;
    });

    tbody.innerHTML = filtered.map(d => `
        <tr>
            <td>
                <strong>${d.name}</strong>
                <div class="card-tags" style="font-size: 0.75rem; color: #666; margin-top: 4px;">
                    ${d.cards.map(c => `${c.name} x${c.quantity}`).join(', ')}
                </div>
            </td>
            <td style="text-align:center">
                <button class="btn-sm" style="background:#28a745" onclick="window.loadDeckToEdit(${d.id})">Sửa</button>
                <button class="btn-sm" style="background:#dc3545" onclick="window.deleteDeck(${d.id})">Xóa</button>
            </td>
        </tr>
    `).join('');
};
    function renderLibrary() {
        const container = document.getElementById('card-lib-view');
        container.innerHTML = window.cacheData.cards.map(c => `
            <div class="card-item" onclick="window.addToDeck(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
                <img src="${c.url}"><div class="card-name-mini">${c.name}</div>
            </div>
        `).join('');
    }

    // ✏️ LOGIC NHẤN SỬA: Nạp thẻ vào ô
// admin.html - Hàm nạp thẻ khi sửa
window.loadDeckToEdit = (id) => {
    const deck = window.cacheData.decks.find(d => d.id === id);
    if (!deck) return;

    document.getElementById('currentDeckId').value = deck.id;
    document.getElementById('deckName').value = deck.name;
    const container = document.getElementById('deck-build-container');
    container.innerHTML = "";

    // Nạp thẻ vào ô soạn thảo
    deck.cards.forEach(c => {
        window.addToDeck(c.id, c.name, c.quantity);
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// admin.html - Logic lưu kèm check trùng hệt thành phần
document.getElementById('save-deck-btn').onclick = async () => {
    const currentId = parseInt(document.getElementById('currentDeckId').value);
    const name = document.getElementById('deckName').value.trim();
    const cards = Array.from(document.querySelectorAll('#deck-build-container .selected-row')).map(r => ({
        cardid: parseInt(r.dataset.id),
        quantity: parseInt(r.querySelector('.q').value)
    }));

    if(!name || cards.length === 0) return alert("Vui lòng nhập tên và chọn bài!");

    // Tạo mã định danh cho bộ bài đang soạn (Sắp xếp ID để so sánh chuẩn)
    const newFingerprint = cards
        .sort((a, b) => a.cardid - b.cardid)
        .map(c => `${c.cardid}:${c.quantity}`)
        .join('|');

    // Kiểm tra trong database hiện tại
    const duplicate = window.cacheData.decks.find(d => {
        if (d.id === currentId) return false; // Bỏ qua chính nó nếu đang sửa
        const existingFingerprint = d.cards
            .sort((a, b) => a.id - b.id)
            .map(c => `${c.id}:${c.quantity}`)
            .join('|');
        return newFingerprint === existingFingerprint;
    });

    if (duplicate) {
        if (!confirm(`Cảnh báo: Bộ bài này giống hệt thành phần của bộ "${duplicate.name}". Bạn vẫn muốn lưu chứ?`)) {
            return;
        }
    }

    await request('/decks', 'POST', { id: currentId, name, cards });
    window.resetDeckForm();
    reloadData();
};
    function checkDuplicateDeck(newCards, currentId) {
        const newSet = newCards.map(c => `${c.cardid}:${c.quantity}`).sort().join('|');
        
        return window.cacheData.decks.find(d => {
            if (d.id === currentId) return false; // Không tự check chính nó khi sửa
            const existingSet = d.cards?.map(c => `${c.id}:${c.quantity || 1}`).sort().join('|');
            return newSet === existingSet;
        });
    }

    // 💾 LƯU NGƯỜI DÙNG & GIẢI ĐẤU
    document.getElementById('save-user-btn').onclick = async () => {
        const name = document.getElementById('userName').value.trim();
        if(!name) return;
        await request(`/usersadd?username=${encodeURIComponent(name)}`, 'POST');
        document.getElementById('userName').value = '';
        reloadData();
    };

    document.getElementById('btn-reg').onclick = async () => {
        const body = {
            competitionid: parseInt(document.getElementById('regComp').value),
            userid: parseInt(document.getElementById('regUser').value),
            deckid: parseInt(document.getElementById('regDeck').value),
            winrate: 50, rank: 1
        };
        if(!body.competitionid || !body.userid) return alert("Vui lòng chọn đủ thông tin!");
        await request('/competition-use', 'POST', body);
        alert("Đăng ký thành công!");
    };

    // 🗑️ XÓA & LÀM MỚI
    window.deleteDeck = async (id) => {
        if(!confirm("Xác nhận xóa bộ bài này?")) return;
        await request('/deck-delete', 'POST', id);
        reloadData();
    };

    window.resetDeckForm = () => {
        document.getElementById('currentDeckId').value = "0";
        document.getElementById('deckName').value = "";
        document.getElementById('deck-build-container').innerHTML = "";
    };

   window.toggleAcc = (header) => {
        const item = header.parentElement;
        item.classList.toggle('active');
        header.querySelector('span').innerText = item.classList.contains('active') ? '−' : '+';
    };

    reloadData();
</script>
</body>
</html>

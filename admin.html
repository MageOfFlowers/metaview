<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản lý</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header><a href="index.html">← Trang chủ</a><h1>⚙️ Admin Panel</h1></header>
        
        <div class="dashboard-grid">
            <div class="card">
                <h3>🏆 Đăng ký Giải đấu</h3>
                <div class="input-group"><label>Giải</label><select id="regComp"></select></div>
                <div class="input-group"><label>Người chơi</label><select id="regUser"></select></div>
                <div class="input-group"><label>Bộ bài</label><select id="regDeck"></select></div>
                <div class="form-grid">
                    <div class="input-group"><label>Winrate (%)</label><input type="number" id="regWin" value="50"></div>
                    <div class="input-group"><label>Hạng (Rank)</label><input type="number" id="regRank" value="1"></div>
                </div>
                <button class="btn-submit" onclick="register()">Xác nhận tham gia</button>
            </div>

            <div class="card" style="grid-column: span 2;">
                <h3>🎴 Tạo bộ bài (Deck)</h3>
                <div class="input-group"><label>Tên bộ bài</label><input type="text" id="deckName"></div>
                <div id="deck-list"></div>
                <button onclick="addRow()" style="margin: 10px 0;">+ Thêm lá bài</button>
                <button class="btn-submit" style="background:var(--primary)" onclick="saveDeck()">Lưu Deck & DeckInfo</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { request } from './js/api.js';
        let cardsData = [];

        async function init() {
            const [u, d, c, cards] = await Promise.all([
                request('/users'), request('/decks'), request('/competitions'), request('/cards')
            ]);
            cardsData = cards;
            fill('regUser', u, 'username'); fill('regDeck', d, 'name'); fill('regComp', c, 'name');
            addRow();
        }

        window.addRow = () => {
            const div = document.createElement('div');
            div.className = 'form-grid';
            div.style.marginBottom = '8px';
            div.innerHTML = `
                <select class="d-id">${cardsData.map(c => `<option value="${c.id}">${c.name} (${c.color})</option>`).join('')}</select>
                <input type="number" class="d-qty" value="1" min="1" max="4">
            `;
            document.getElementById('deck-list').appendChild(div);
        };

        window.saveDeck = async () => {
            const name = document.getElementById('deckName').value;
            const ids = document.querySelectorAll('.d-id');
            const qtys = document.querySelectorAll('.d-qty');
            const cards = Array.from(ids).map((el, i) => ({ cardid: parseInt(el.value), quantity: parseInt(qtys[i].value) }));
            
            await request('/decks', 'POST', { name, cards });
            alert("Tạo Deck thành công!"); location.reload();
        };

        window.register = async () => {
            const body = {
                competitionid: parseInt(document.getElementById('regComp').value),
                userid: parseInt(document.getElementById('regUser').value),
                deckid: parseInt(document.getElementById('regDeck').value),
                winrate: parseFloat(document.getElementById('regWin').value),
                rank: parseInt(document.getElementById('regRank').value)
            };
            await request('/competition-use', 'POST', body);
            alert("Đã lưu kết quả!");
        };

        function fill(id, data, key) { document.getElementById(id).innerHTML = data.map(i => `<option value="${i.id}">${i[key]}</option>`).join(''); }
        init();
    </script>
</body>
</html>
